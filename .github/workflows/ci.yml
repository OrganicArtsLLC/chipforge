name: CI — Engine Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Run engine test suite (254 tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Core engine tests
        run: python3 tests/test_engine_comprehensive.py

      - name: AI engine tests
        run: python3 tests/test_ai_engine.py

      - name: Temperament tests
        run: python3 tests/test_temperament.py

      - name: Filter envelope tests
        run: python3 tests/test_filter_envelope.py

      - name: Multi-layer tests
        run: python3 tests/test_multi_layer.py

      - name: Expressive sequencer tests
        run: python3 tests/test_expressive_sequencer.py

      - name: Dynamics curve tests
        run: python3 tests/test_dynamics_curve.py

      - name: Orchestral preset tests
        run: python3 tests/test_orchestral_presets.py
